<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="yRfIAHAD9fwynR62WNA07uv6yo1l67ubmiL_c0HRLEQ" />
    <title>Anime Wiki</title>
    <!-- PWA: makes "Add to Home Screen" work on Android/iOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
    <!-- Spec-compliant version (Chrome / Android / new browsers). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Apple legacy alias — still required by iOS Safari for "Add to Home Screen". -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anime Wiki" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!--
      Theme bootstrap — runs synchronously BEFORE the React bundle so the page
      never shows a wrong-theme flash for the first paint.
    -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('anm-theme') || 'dark';
          var resolved =
            mode === 'system'
              ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
              : mode;
          var root = document.documentElement;
          if (resolved === 'light') {
            root.classList.add('light');
          } else {
            root.classList.add('dark');
          }
          root.dataset.theme = resolved;
          root.style.colorScheme = resolved;
        } catch (_) {}
      })();
    </script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
